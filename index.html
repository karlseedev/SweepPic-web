<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SweepPic Support</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 18px;
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { font-size: 15px; color: #6e6e73; margin-bottom: 32px; }
    .contact-label { font-size: 13px; color: #6e6e73; margin-bottom: 8px; }
    a.email {
      display: inline-block;
      font-size: 16px;
      color: #0071e3;
      text-decoration: none;
      font-weight: 500;
    }
    a.email:hover { text-decoration: underline; }
    .divider {
      border: none;
      border-top: 1px solid #e5e5ea;
      margin: 28px 0;
    }
    .links { display: flex; justify-content: center; gap: 24px; }
    .links a {
      font-size: 13px;
      color: #6e6e73;
      text-decoration: none;
    }
    .links a:hover { color: #0071e3; }
  </style>
</head>
<body>
  <div class="card">
    <h1>SweepPic</h1>
    <p class="subtitle" id="subtitle"></p>
    <p class="contact-label" id="contact-label"></p>
    <a class="email" href="mailto:support@sweeppic.app">support@sweeppic.app</a>
    <hr class="divider">
    <div class="links">
      <a href="" id="privacy-link"></a>
      <a href="" id="terms-link"></a>
    </div>
  </div>

  <script>
    const isKo = navigator.language.startsWith("ko");
    document.documentElement.lang = isKo ? "ko" : "en";
    document.getElementById("subtitle").textContent = isKo
      ? "사진 정리 앱"
      : "Photo cleanup app";
    document.getElementById("contact-label").textContent = isKo
      ? "문의"
      : "Contact";
    const privacyLink = document.getElementById("privacy-link");
    const termsLink = document.getElementById("terms-link");
    const lang = isKo ? "ko" : "en";
    privacyLink.href = "privacy-" + lang + ".html";
    privacyLink.textContent = isKo ? "개인정보처리방침" : "Privacy Policy";
    termsLink.href = "terms-" + lang + ".html";
    termsLink.textContent = isKo ? "이용약관" : "Terms of Use";
  </script>
</body>
</html>
